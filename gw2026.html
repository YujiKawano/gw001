<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グループワーク ポータル</title>

<style>
  :root{
    --bg:#0a0f1a;
    --panel:#0f1726;
    --line:#29405f;
    --text:#e8f0ff;
    --accent:#62b0ff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Consolas, "Courier New", monospace, "Yu Gothic", Meiryo, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(98,176,255,.12), transparent 28%),
      linear-gradient(180deg, #070b13, #0a0f1a 45%, #0d1320);
    min-height:100vh;
  }

  .wrap{
    max-width:1040px;
    margin:0 auto;
    padding:28px 20px 40px;
  }

  .terminal{
    background:rgba(15,23,38,.96);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
  }

  .terminal-head{
    display:flex;
    justify-content:space-between;
    padding:12px 16px;
    background:#111b2d;
    border-bottom:1px solid var(--line);
  }

  .lights{display:flex;gap:8px;}
  .light{width:12px;height:12px;border-radius:50%;}
  .red{background:#ff6b6b}
  .yellow{background:#ffd166}
  .green{background:#4ade80}

  .terminal-body{padding:22px;}
  .prompt{color:#6ee7b7;margin-bottom:6px;}
  h1{margin:0 0 20px;font-size:30px;}

  .menu{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }

  button.card{
    width:100%;
    border:1px solid #35537c;
    border-radius:14px;
    padding:16px;
    background:#182440;
    color:#fff;
    cursor:pointer;
    text-align:left;
    transition:.15s;
  }

  button.card:hover{
    border-color:var(--accent);
    transform:translateY(-1px);
  }

  .row{display:flex;gap:10px;}
  .symbol{color:#6ee7b7;}
  .label{font-size:17px;font-weight:700;}

  @media (max-width:760px){
    .menu{grid-template-columns:1fr}
  }
</style>
</head>

<body>

<script>
(function () {
  const pass = prompt("パスワードを入力してください");
  if (pass !== "aip") {
    document.body.innerHTML =
      "<div style='display:flex;align-items:center;justify-content:center;height:100vh'>アクセスできません</div>";
    throw new Error("Unauthorized");
  }
})();
</script>

<div class="wrap">
  <section class="terminal">
    <div class="terminal-head">
      <div class="lights">
        <span class="light red"></span>
        <span class="light yellow"></span>
        <span class="light green"></span>
      </div>
      <div>gw2026</div>
    </div>

    <div class="terminal-body">
      <div class="prompt">user@aip-training:~$ open portal</div>
      <h1>グループワーク ポータル</h1>

      <div class="menu">

        <button class="card" onclick="openPage('groupwork001.html')">
          <div class="row"><div class="symbol">&gt;</div><div class="label">グループワークその１</div></div>
        </button>

        <button class="card" onclick="openPage('groupwork001_answer.html')">
          <div class="row"><div class="symbol">&gt;</div><div class="label">グループワークその１（正解一覧）</div></div>
        </button>

        <button class="card" onclick="openPage('groupwork002.html')">
          <div class="row"><div class="symbol">&gt;</div><div class="label">グループワークその２</div></div>
        </button>

        <button class="card" onclick="openPage('groupwork002_answer.html')">
          <div class="row"><div class="symbol">&gt;</div><div class="label">グループワークその２（正解一覧）</div></div>
        </button>

        <button class="card" onclick="openPage('groupwork003.html')">
          <div class="row"><div class="symbol">&gt;</div><div class="label">グループワークその３</div></div>
        </button>

        <button class="card" onclick="openPage('groupwork003_answer.html')">
          <div class="row"><div class="symbol">&gt;</div><div class="label">グループワークその３（正解一覧）</div></div>
        </button>

      </div>
    </div>
  </section>
</div>

<script>
function openPage(url){
  window.open(url, "_blank");
}
</script>
　
</body>
</html>
